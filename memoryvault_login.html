<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>MemoryVault Professional Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Inter", sans-serif;
      min-height: max(884px, 100dvh);
    }
    .glass-panel {
      background: rgba(19, 127, 236, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
  <div class="relative w-full max-w-[430px] h-[932px] overflow-hidden bg-background-dark flex flex-col shadow-2xl">
    <div class="absolute top-[-10%] left-[-20%] w-[80%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[80%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>

    <div class="flex items-center justify-between px-6 pt-14 pb-6 z-10">
      <div class="flex items-center gap-3">
        <div class="bg-primary/20 p-2 rounded-xl border border-primary/30">
          <span class="material-symbols-outlined text-primary text-3xl">psychology</span>
        </div>
        <h2 class="text-2xl font-bold tracking-tight text-slate-100">MemoryVault</h2>
      </div>
    </div>

    <div class="px-6 py-4 z-10">
      <div class="w-full aspect-[4/3] rounded-3xl overflow-hidden glass-panel flex items-center justify-center relative group">
        <div class="absolute inset-0 bg-gradient-to-br from-primary/30 to-transparent"></div>
        <div class="relative z-20 flex flex-col items-center text-center p-8">
          <span class="material-symbols-outlined text-primary text-7xl mb-4 opacity-80">lock_open</span>
          <h3 class="text-xl font-semibold mb-2">Secure Access</h3>
          <p class="text-slate-400 text-sm">Your personal knowledge vault is encrypted and protected.</p>
        </div>
        <div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-overlay" data-alt="Abstract blue and teal geometric digital pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAO_e5x3Ycbn5p_Odr2qYw1SXewBUY7RqxwYc8JVgie9jLTCYyT5Wsf8VNRpWQvBB5jJLitvSKtajqqaww1YxEF6SJra1RDTDSvGpaNsSw9vJbsuc-m7z8REh9meMou55nVePimfuSGy789pbetz1C3wjgo1-ShPBkzvyHuF8WXipv1JLuweQO4kcQPMYBTNK1FS0cOVFi9Hll0IyEfxu1UxfxvupvYFZNGs1d2PDp-lC6kppj3ndZZwrLm0DzzeS0g51NVrBtjGKkS');"></div>
      </div>
    </div>

    <div class="flex-1 px-6 pt-8 pb-10 flex flex-col z-10">
      <div class="mb-8">
        <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
        <p class="text-slate-400">Please sign in to continue your journey.</p>
      </div>

      <form class="space-y-4">
        <div class="space-y-2">
          <label class="block text-sm font-medium text-slate-300 ml-1">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
            <input class="w-full h-14 bg-slate-800/50 border border-slate-700 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@example.com" type="email">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="block text-sm font-medium text-slate-300">Password</label>
            <a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot?</a>
          </div>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
            <input class="w-full h-14 bg-slate-800/50 border border-slate-700 rounded-xl pl-12 pr-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" type="password">
            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl cursor-pointer">visibility</span>
          </div>
        </div>

        <button class="w-full h-14 mt-4 bg-primary hover:bg-primary/90 text-white font-semibold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-transform active:scale-[0.98]" type="submit">
          Sign In
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>

      <div class="mt-auto pt-8">
        <div class="flex items-center gap-4 mb-6">
          <div class="h-[1px] flex-1 bg-slate-800"></div>
          <span class="text-slate-500 text-xs uppercase tracking-widest font-bold">Or connect with</span>
          <div class="h-[1px] flex-1 bg-slate-800"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button class="h-12 border border-slate-700 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-colors">
            <img alt="Google logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbrqL1oHSLoqDgzzJgafApXM4iNWGUKj1eR4UkqPwD_hGt8dCjBsxd1ln-Fr2TqrGDq4uLOmg67G8xVzz4iJTtYY1VaC-JkznY-7sNKiFKgFUrNqo-8EqW3wKhPx_wDtnGVE0KjhEhpIdRpdCrlur1dsDMGwXq4BlrjBEwtcmWFqcAzqQD3Olj0FhIrORvYGZDm3bvG_NmeHgAalwnPOSpfoZkRQhHbF8mRP7xloPe_ZPg3TTBYdiDkuSZp1m6kFzU_fLvE9ryH30n">
            <span class="text-sm font-medium">Google</span>
          </button>
          <button class="h-12 border border-slate-700 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-colors">
            <span class="material-symbols-outlined text-slate-100">ios</span>
            <span class="text-sm font-medium">Apple</span>
          </button>
        </div>

        <p class="text-center text-slate-400 mt-8">
          New to MemoryVault?
          <a class="text-primary font-semibold" href="#">Create Account</a>
        </p>
      </div>
    </div>

    <div class="flex gap-2 border-t border-slate-800 bg-slate-900 px-4 pb-8 pt-2 z-20">
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
        <div class="flex h-8 items-center justify-center"><span class="material-symbols-outlined">home</span></div>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
        <div class="flex h-8 items-center justify-center"><span class="material-symbols-outlined">search</span></div>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
        <div class="flex h-8 items-center justify-center"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span></div>
      </a>
    </div>
  </div>
</body>
</html>
