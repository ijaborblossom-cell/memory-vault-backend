<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MemoryVault - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38bdf8",
                        "background-light": "#f8fafc",
                        "background-dark": "#022c22",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                    },
                },
            },
        };
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light .glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #0d9488 0%, #0369a1 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-sans min-h-screen relative overflow-hidden flex flex-col items-center justify-center p-6">
<div class="blob top-[-10%] left-[-10%]"></div>
<div class="blob bottom-[-10%] right-[-10%] bg-emerald-900/40"></div>
<div class="w-full max-w-md space-y-8 relative z-10">
<div class="text-center space-y-4">
<div class="flex items-center justify-center gap-2">
<div class="p-2 glass rounded-2xl">
<img alt="MemoryVault Logo" class="w-10 h-10" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAx3EyIu7u5UH38vFg3-GB0BlaIv80JF90pDi_ryerQH7RaEeiNOdG2Ni8y1oM8fwNCf3SGOUYMqNaOGzqMyl8AEnE6-dWe_80rCLGcPzT-Q6I8sLF4KeuPq4vbKTKM6EGP2mReEJsbhkpjyDEy7eKqPvNiFXcv1tiuyJg-gaRB8wLSfXfCHjUUIh62_F74rlmw4ZuzH7AW-XkMW3V10z9C4Mdt2BBeT-P5S8U2CnHCQxdegc0I4aBNtKAPyKtcDF2xgdyUdhrz13cv"/>
</div>
<h1 class="text-2xl font-bold tracking-tight">MemoryVault</h1>
</div>
<div class="space-y-2">
<h2 class="text-4xl font-display text-emerald-900 dark:text-emerald-400">Secure Your Legacy</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Join the sanctuary for your most meaningful insights.</p>
</div>
</div>
<div class="glass p-8 rounded-[2.5rem] shadow-2xl space-y-6">
<form action="#" class="space-y-5">
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-black/20 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary rounded-2xl transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">alternate_email</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-black/20 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary rounded-2xl transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-white/50 dark:bg-black/20 border-0 ring-1 ring-slate-200 dark:ring-white/10 focus:ring-2 focus:ring-primary rounded-2xl transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-rounded text-lg">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-r from-primary to-emerald-400 text-white font-bold rounded-2xl shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200 text-lg" type="submit">
                    Get Started
                </button>
</form>
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-white/10"></div>
<span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400">Or Continue With</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-white/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 glass hover:bg-white/20 dark:hover:bg-white/10 rounded-2xl transition-all group">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 glass hover:bg-white/20 dark:hover:bg-white/10 rounded-2xl transition-all group">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform dark:fill-white fill-black" viewBox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.67-1.48 3.671-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.605 1.09zM15.53 4.854c.87-1.05 1.454-2.506 1.299-3.961-1.247.052-2.754.831-3.65 1.883-.805.922-1.506 2.415-1.312 3.831 1.389.104 2.792-.701 3.663-1.753z"></path>
</svg>
<span class="text-sm font-medium">Apple</span>
</button>
</div>
</div>
<p class="text-center text-slate-500 dark:text-slate-400 text-sm">
            Already have an account?
            <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
<div class="fixed bottom-6 right-6 flex flex-col gap-2">
<button class="p-4 glass rounded-full shadow-lg text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-rounded">contrast</span>
</button>
</div>
</div>
<div class="absolute bottom-6 left-0 right-0 flex justify-center gap-6 text-[10px] uppercase tracking-widest font-semibold text-slate-400 dark:text-slate-600">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</body>
</html>
