<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Memory Vault icon">
  <defs>
    <linearGradient id="mvBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
    <linearGradient id="mvAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="mvShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#mvBg)" stroke="url(#mvAccent)" stroke-width="1.5"/>
  <!-- Inner glow circle -->
  <circle cx="32" cy="30" r="20" fill="none" stroke="rgba(76,175,80,0.15)" stroke-width="8"/>
  <!-- Vault body -->
  <rect x="18" y="20" width="28" height="22" rx="4" fill="none" stroke="url(#mvAccent)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Vault lock arch -->
  <path d="M24 20v-4a8 8 0 0 1 16 0v4" fill="none" stroke="url(#mvShine)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole circle -->
  <circle cx="32" cy="30" r="3.2" fill="url(#mvShine)"/>
  <!-- Keyhole slot -->
  <path d="M32 33v4" stroke="#0f2027" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle dots -->
  <circle cx="14" cy="12" r="1.2" fill="#81c784" opacity="0.7"/>
  <circle cx="52" cy="14" r="0.9" fill="#66bb6a" opacity="0.5"/>
  <circle cx="50" cy="50" r="1" fill="#4caf50" opacity="0.6"/>
  <circle cx="12" cy="48" r="0.8" fill="#81c784" opacity="0.4"/>
</svg>
